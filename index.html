<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企業方案需求表｜Aspect English</title>

  <style>
    body {
      font-family: "Noto Sans TC", Arial, sans-serif;
      background: #f4eee9;
      color: #3b1f17;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 780px;
      margin: 40px auto;
      background: #fffaf6;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .header{
      display:flex;
      align-items:center;
      gap:20px;
      margin-bottom:30px;
}
    .logo {
     width:180px;
     height:auto;
    }

    .header h1{
    margin:0;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 28px;
      color:#755143;
    }

    .section {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #d6c8bf;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: white;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .radio-group {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .radio-card {
      flex: 1;
      border: 2px solid #d6c8bf;
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      background: white;
    }

    .radio-card input {
      display: none;
    }

    .radio-card.active {
      border-color: #4a2118;
      background: #f1e5df;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    .notice {
      background: #f1e5df;
      padding: 14px;
      border-radius: 10px;
      line-height: 1.7;
      margin-bottom: 20px;
      color: #4a2118;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #4a2118;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .msg {
      margin-top: 18px;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        margin: 16px;
        padding: 22px;
      }

      .radio-group {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
    <img src="logo#d6c8bf.jpg" alt="logo" class="logo"> 
  </div>

    <h1>企業多益英文培訓需求表</h1>
    <div class="subtitle">Aspect English 雅斯貝互動英語認證中心</div>

    <form id="enterpriseForm">

      <div class="section">
        <label>請選擇方案類型 *</label>
        <div class="radio-group">
          <label class="radio-card active" id="cardTraining">
            <input type="radio" name="type" value="企業內訓" checked>
            企業內訓<br>
            <small>講師至企業授課</small>
          </label>

          <label class="radio-card" id="cardGroup">
            <input type="radio" name="type" value="團課到班">
            團課到班<br>
            <small>員工至補習班上課</small>
          </label>
        </div>
      </div>

      <div class="notice" id="trainingNotice">
        企業內訓標準可安排時段為 <strong>下午 13:00–16:00</strong>。<br>
        若需其他時段，可於「其他時段需求」欄位填寫。
      </div>

      <div class="section">
        <label>課程種類 *</label>
        <select name="course_type" required>
          <option value="">請選擇課程種類</option>
          <option>多益口說</option>
          <option>多益寫作</option>
          <option>多益口說及寫作</option>
          <option>生活口說</option>
          <option>多益短期班（一個月）</option>
          <option>多益短期班（半年）</option>
          <option>多益保證班（聽力及閱讀）</option>
        </select>
      </div>

      <div class="notice">
        ※ 多益保證班及口說課程會依照企業人數、時數與需求內容另行評估。<br>
        ※ 我們會依據您填寫的內容，由專人確認後提供正式報價單。
      </div>

      <div class="section">
        <label>公司名稱 *</label>
        <input type="text" name="company_name" required>
      </div>

      <div class="section">
        <label>聯絡人 *</label>
        <input type="text" name="contact_name" required>
      </div>

      <div class="section">
        <label>聯絡電話 *</label>
        <input type="tel" name="phone" required>
      </div>

      <div class="section">
        <label>E-mail *</label>
        <input type="email" name="email" required placeholder="example@gmail.com">
      </div>

      <div class="section">
        <label>預計人數 *</label>
        <input
          type="text"
          name="people_count"
          required
          placeholder="請輸入明確人數，例如：12；若尚未確認請填暫無"
        >
      </div>

      <div class="section">
        <label>預計總時數 *</label>
        <input
          type="text"
          name="total_hours"
          required
          placeholder="請輸入明確時數，例如：24；若尚未確認請填暫無"
        >
      </div>

      <div class="section">
        <label>預算範圍 *</label>
        <select name="budget" required>
          <option value="">請選擇</option>
          <option>暫無</option>
          <option>3萬元以下</option>
          <option>3萬-5萬元</option>
          <option>5萬-10萬元</option>
          <option>10萬元以上</option>
        </select>
      </div>

      <div class="section">
        <label id="weeklyLabel">每週上課次數 *</label>
        <select name="weekly_count" id="weeklyCount" required>
          <option value="">請選擇</option>
          <option>1週 / 1次</option>
          <option>1週 / 2次</option>
          <option>1週 / 3次</option>
          <option>暫無</option>
          <option>其他</option>
        </select>
      </div>

      <div class="section hidden" id="weeklyOtherBox">
        <label>其他上課次數 *</label>
        <input
          type="text"
          name="weekly_other"
          id="weeklyOtherInput"
          placeholder="例如：兩週一次、依企業排班安排"
        >
      </div>

      <div id="trainingFields">
        <div class="section">
          <label>其他時段需求</label>
          <textarea name="other_time" placeholder="例如：每週五 14:00-16:00、希望改上午、需另行討論等"></textarea>
        </div>

        <div class="section">
          <label>上課地點 *</label>
          <input
            type="text"
            name="location"
            id="locationInput"
            placeholder="請填寫企業上課地址或區域"
            required
          >
        </div>
      </div>

      <div id="groupFields" class="hidden">
        <div class="section">
          <label>其他時段需求</label>
          <textarea name="other_time_group" placeholder="例如：平日晚上、假日下午、希望固定週六等"></textarea>
        </div>
      </div>

      <div class="section">
        <label>希望開課月份 *</label>
        <input type="month" name="start_date" required>
      </div>

      <div class="section">
        <label>備註</label>
        <textarea name="note" placeholder="可填寫課程目標、特殊需求、希望加強方向等"></textarea>
      </div>

      <button type="submit" id="submitBtn">送出需求</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwYgAdPpp-HDhm1tbppoLSfhetouCkMW67gaiSJAe0Tknc1G9HZGBPnGiY2KFOIgn3t/exec';

    const form = document.getElementById('enterpriseForm');
    const msg = document.getElementById('msg');
    const submitBtn = document.getElementById('submitBtn');

    const cardTraining = document.getElementById('cardTraining');
    const cardGroup = document.getElementById('cardGroup');
    const trainingFields = document.getElementById('trainingFields');
    const groupFields = document.getElementById('groupFields');
    const trainingNotice = document.getElementById('trainingNotice');
    const weeklyLabel = document.getElementById('weeklyLabel');
    const locationInput = document.getElementById('locationInput');

    const weeklyCount = document.getElementById('weeklyCount');
    const weeklyOtherBox = document.getElementById('weeklyOtherBox');
    const weeklyOtherInput = document.getElementById('weeklyOtherInput');

    weeklyCount.addEventListener('change', () => {
      if (weeklyCount.value === '其他') {
        weeklyOtherBox.classList.remove('hidden');
        weeklyOtherInput.required = true;
      } else {
        weeklyOtherBox.classList.add('hidden');
        weeklyOtherInput.required = false;
        weeklyOtherInput.value = '';
      }
    });

    document.querySelectorAll('input[name="type"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const type = document.querySelector('input[name="type"]:checked').value;

        if (type === '企業內訓') {
          cardTraining.classList.add('active');
          cardGroup.classList.remove('active');
          trainingFields.classList.remove('hidden');
          groupFields.classList.add('hidden');
          trainingNotice.classList.remove('hidden');
          weeklyLabel.textContent = '每週上課次數 *';
          locationInput.required = true;
        } else {
          cardGroup.classList.add('active');
          cardTraining.classList.remove('active');
          groupFields.classList.remove('hidden');
          trainingFields.classList.add('hidden');
          trainingNotice.classList.add('hidden');
          weeklyLabel.textContent = '每週到班天數 *';
          locationInput.required = false;
          locationInput.value = '';
        }
      });
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = '送出中...';
      msg.textContent = '';

      const formData = new FormData(form);
      const type = formData.get('type');

      let email = formData.get('email') || '';
      if (email && !email.includes('.')) {
        email = email + '.com';
      }

      let weeklyValue = formData.get('weekly_count');
      if (weeklyValue === '其他') {
        weeklyValue = formData.get('weekly_other') || '其他';
      }

      const otherTime =
        type === '企業內訓'
          ? formData.get('other_time')
          : formData.get('other_time_group');

      const data = {
        type: type,
        course_type: formData.get('course_type'),
        company_name: formData.get('company_name'),
        contact_name: formData.get('contact_name'),
        phone: formData.get('phone'),
        email: email,
        people_count: formData.get('people_count'),
        total_hours: formData.get('total_hours'),
        budget: formData.get('budget'),
        weekly_count: weeklyValue,
        other_time: otherTime,
        start_date: formData.get('start_date'),
        location: type === '企業內訓' ? formData.get('location') : '',
        note: formData.get('note')
      };

      try {
        await fetch(WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(data)
        });

        alert('已送出成功！系統將寄送確認信至您的 E-mail，後續將由專人確認需求並與您聯繫。');

        msg.style.color = '#2e7d32';
        msg.textContent = '已送出成功，我們將由專人確認需求並與您聯繫。';

        form.reset();

        cardTraining.classList.add('active');
        cardGroup.classList.remove('active');
        trainingFields.classList.remove('hidden');
        groupFields.classList.add('hidden');
        trainingNotice.classList.remove('hidden');
        weeklyLabel.textContent = '每週上課次數 *';
        locationInput.required = true;

        weeklyOtherBox.classList.add('hidden');
        weeklyOtherInput.required = false;
        weeklyOtherInput.value = '';

      } catch (error) {
        msg.style.color = '#c62828';
        msg.textContent = '送出失敗，請稍後再試。';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = '送出需求';
    });
  </script>
</body>
</html>
